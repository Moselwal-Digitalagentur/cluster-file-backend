services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Moselwal\Typo3ClusterCache\:
    resource: '../Classes/*'
    exclude:
      - '../Classes/Domain/*'
      # Application/ + Infrastructure/Cache/ + Infrastructure/LocalStore/ +
      # Infrastructure/Cache/Backend/ are manually instantiated by
      # ClusterFileBackend::wireNamespaceBoundServices() with runtime values
      # (CacheNamespace, FrontendInterface, localPath, …). Symfony cannot
      # autowire them because the metadata-cache dependency chain bottoms out
      # at FrontendInterface, which has multiple registered implementations
      # — the DI compiler then refuses to pick one and the container build
      # fails with "Cannot autowire service … argument $cache references
      # interface FrontendInterface". Keeping these out of the autowired set
      # is correct in DDD terms too: they are application-/infrastructure-
      # services bound to a runtime cache namespace, not container-managed.
      - '../Classes/Application/*'
      - '../Classes/Infrastructure/Cache/Typo3MetadataCache.php'
      - '../Classes/Infrastructure/Cache/Backend/*'
      - '../Classes/Infrastructure/LocalStore/*'

  _instanceof:
    Moselwal\Typo3ClusterCache\Domain\Contract\CompressorPort:
      tags: ['cfb.compressor']
    Moselwal\Typo3ClusterCache\Domain\Contract\ClockPort:
      tags: ['cfb.clock']
    Moselwal\Typo3ClusterCache\Domain\Contract\MetricsPort:
      tags: ['cfb.metrics']

  # Default-Bindings
  Moselwal\Typo3ClusterCache\Domain\Contract\ClockPort:
    alias: Moselwal\Typo3ClusterCache\Infrastructure\Time\SystemClock

  Moselwal\Typo3ClusterCache\Domain\Contract\MetricsPort:
    alias: Moselwal\Typo3ClusterCache\Infrastructure\Observability\PrometheusMetrics

  # Presentation
  Moselwal\Typo3ClusterCache\Presentation\Command\GarbageCollectCommand:
    public: true
    tags:
      - name: 'console.command'
        command: 'clusterfilebackend:gc'
        description: 'Garbage collection for ClusterFileBackend metadata'

  Moselwal\Typo3ClusterCache\Presentation\Command\WarmUpCommand:
    public: true
    tags:
      - name: 'console.command'
        command: 'clusterfilebackend:warmup'
        description: 'Pre-flight warm-up of cluster-cache namespaces (deployment-time)'

  Moselwal\Typo3ClusterCache\Presentation\EventListener\CacheWarmupListener:
    tags:
      - name: 'event.listener'
        event: 'TYPO3\CMS\Core\Cache\Event\CacheWarmupEvent'
