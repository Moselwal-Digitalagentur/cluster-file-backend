services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  # We register only the leaf services that the Symfony DI compiler can
  # actually resolve. The application-/infrastructure-layer adapters
  # (Application/*, Infrastructure/Cache/Typo3MetadataCache,
  # Infrastructure/LocalStore/*) are constructed manually by
  # ClusterFileBackend::wireNamespaceBoundServices() with a runtime-bound
  # CacheNamespace and FrontendInterface — they are not container-managed.
  # Exposing them through a `resource: '../Classes/*'` glob would force the
  # compiler to autowire e.g. Typo3MetadataCache's `$cache: FrontendInterface`
  # argument, which has multiple registered implementations and so cannot be
  # picked automatically. The DI build then fails with "Cannot autowire …
  # argument $cache references interface FrontendInterface".
  Moselwal\Typo3ClusterCache\Infrastructure\Time\SystemClock: ~
  Moselwal\Typo3ClusterCache\Infrastructure\Observability\PrometheusMetrics: ~
  Moselwal\Typo3ClusterCache\Infrastructure\Observability\StructuredLoggerEnricher: ~
  Moselwal\Typo3ClusterCache\Infrastructure\Compression\NullCompressor: ~
  Moselwal\Typo3ClusterCache\Infrastructure\Compression\GzipCompressor: ~
  Moselwal\Typo3ClusterCache\Infrastructure\Compression\ZstdCompressor: ~
  Moselwal\Typo3ClusterCache\Infrastructure\Cache\Backend\OptionsValidator: ~
  Moselwal\Typo3ClusterCache\Infrastructure\WarmUp\BackendWarmUpRunner: ~
  Moselwal\Typo3ClusterCache\Infrastructure\GarbageCollect\BackendGarbageCollectRunner: ~

  _instanceof:
    Moselwal\Typo3ClusterCache\Domain\Contract\CompressorPort:
      tags: ['cfb.compressor']
    Moselwal\Typo3ClusterCache\Domain\Contract\ClockPort:
      tags: ['cfb.clock']
    Moselwal\Typo3ClusterCache\Domain\Contract\MetricsPort:
      tags: ['cfb.metrics']

  # Default-Bindings
  Moselwal\Typo3ClusterCache\Domain\Contract\ClockPort:
    alias: Moselwal\Typo3ClusterCache\Infrastructure\Time\SystemClock

  Moselwal\Typo3ClusterCache\Domain\Contract\MetricsPort:
    alias: Moselwal\Typo3ClusterCache\Infrastructure\Observability\PrometheusMetrics

  # Presentation
  # Both CLI commands inject Infrastructure runners
  # (BackendGarbageCollectRunner, BackendWarmUpRunner) that lazy-resolve
  # the namespace-bound Application services on demand via the CacheManager
  # — see those classes for the rationale. The commands themselves are
  # therefore safe to autowire.
  Moselwal\Typo3ClusterCache\Presentation\Command\GarbageCollectCommand:
    public: true
    tags:
      - name: 'console.command'
        command: 'clusterfilebackend:gc'
        description: 'Garbage collection for ClusterFileBackend metadata'

  Moselwal\Typo3ClusterCache\Presentation\Command\WarmUpCommand:
    public: true
    tags:
      - name: 'console.command'
        command: 'clusterfilebackend:warmup'
        description: 'Pre-flight warm-up of cluster-cache namespaces (deployment-time)'

  Moselwal\Typo3ClusterCache\Presentation\EventListener\CacheWarmupListener:
    tags:
      - name: 'event.listener'
        event: 'TYPO3\CMS\Core\Cache\Event\CacheWarmupEvent'
